  <!-- Initialize Frappe Globals and Boot Data -->
  <script>
    window.frappe = window.frappe || {};
    frappe.provide = function (s) {
      let obj = window;
      s.split('.').forEach(p => {
        if (!obj[p]) obj[p] = {};
        obj = obj[p];
      });
    };

    // Essential sub-namespaces
    frappe.provide("frappe.boot");
    frappe.provide("frappe.assets");
    frappe.provide("frappe.utils");
    frappe.provide("frappe.datetime");
    frappe.provide("crm");

    // Pre-initialize boot and sys_defaults to prevent datetime.js from crashing
    frappe.boot = frappe.boot || {};
    frappe.boot.time_zone = frappe.boot.time_zone || { system: "UTC", user: "UTC" };
    frappe.sys_defaults = frappe.sys_defaults || { time_zone: "UTC", date_format: "yyyy-mm-dd", time_format: "HH:mm:ss" };

    // Polyfills/Placeholders for common utilities used by widgets
    window["__"] = window["__"] || ((s) => s);
    frappe.utils.escape_html = frappe.utils.escape_html || ((s) => {
      if (!s) return "";
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    });
    frappe.datetime.str_to_user = frappe.datetime.str_to_user || ((d) => d);
    frappe.datetime.get_today = frappe.datetime.get_today || (() => new Date().toISOString().slice(0, 10));
    window.format_currency = window.format_currency || ((v, c) => (c === 'INR' ? '₹' : (c || '$')) + parseFloat(v || 0).toLocaleString());
    frappe.show_alert = frappe.show_alert || ((msg) => console.log("Frappe Alert:", msg));

    // Suppress "Invalid Request" modal as requested by user
    window.msgprint = window.frappe.msgprint = function (msg) {
      if (msg === "Invalid Request" || (msg && msg.message === "Invalid Request")) {
        console.log("Suppressed 'Invalid Request' modal.");
        return;
      }
      console.log("frappe.msgprint:", msg);
    };
  </script>

  <!-- Boot Data (Jinja2) -->
  <script>
    window.frappe = window.frappe || {};
    window.frappe.boot = {
      developer_mode: 0,
      sysdefaults: { currency: 'INR' },
      docs: []
    };
    window.frappe.csrf_token = "";

    {% if boot %}
    try {
      window.frappe.boot = {{ boot | tojson }
    }
    window.frappe.csrf_token = "{{ boot.csrf_token }}";
    } catch (e) {
      console.warn("Error parsing server boot data:", e);
    }
    {% endif %}
  </script>

  <!-- CRM Widgets Dependencies (Loaded dynamically to avoid Vite bundling issues) -->
  <script>
    (function () {
      // Script loader with promise support
      const loadScript = (src) => {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.async = false; // Ensure sequential execution if needed
          s.onload = () => {
            console.log(`Loaded script: ${src}`);
            resolve();
          };
          s.onerror = (e) => {
            console.error(`Failed to load script: ${src}`, e);
            reject(e);
          };
          document.head.appendChild(s);
        });
      };

      // Fetch assets and load dependencies
      fetch("/assets/assets.json")
        .then(r => r.json())
        .then(assets => {
          frappe.boot.assets_json = assets;

          // Sequential loading of core dependencies
          return loadScript("/assets/frappe/js/lib/jquery/jquery.min.js")
            .then(() => loadScript(assets["libs.bundle.js"]))
            .then(() => loadScript(assets["desk.bundle.js"]))
            .then(() => {
              // Now load widgets in parallel (they depend on core frappe libraries)
              const widgets = [
                "/assets/crm/js/am_dashboard_widget.js",
                "/assets/crm/js/combined_dashboard_widget.js",
                "/assets/crm/js/pending_tasks_widget.js",
                "/assets/crm/js/sm_pipeline_dashboard_widget.js"
              ];
              // Use sequential for widgets too just in case there are cross-dependencies
              return widgets.reduce((p, src) => p.then(() => loadScript(src)), Promise.resolve());
            });
        })
        .then(() => {
          console.log("CRM Dashboard dependencies loaded successfully.");
          window.crm_ready = true;
        })
        .catch(err => console.error("Error initializing CRM Dashboard dependencies:", err));
    })();
  </script>
